<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토목기사 기출문제</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>토목기사 기출문제</h1>
        <p>문제 풀이 + 채점 + 성적관리 + OMR/단일학습 모드 지원</p>
        <p><a href="./review.html">문제 검수 웹앱 바로가기</a></p>
      </header>

      <section class="toolbar">
        <label>
          프리셋:
          <select id="presetSelect"></select>
        </label>
        <button id="btnApplyPreset">프리셋 적용</button>
        <label>
          모드:
          <select id="modeSelect">
            <option value="learn">학습 모드</option>
            <option value="test">시험 모드</option>
          </select>
        </label>
        <label>
          출제분류:
          <select id="examCategory">
            <option value="all">전체</option>
            <option value="토목기사">토목기사</option>
            <option value="공기업">공기업</option>
            <option value="공무원">공무원</option>
          </select>
        </label>
        <label>
          난이도:
          <select id="difficultySelect">
            <option value="all">전체</option>
            <option value="easy">하</option>
            <option value="normal">중</option>
            <option value="hard">상</option>
          </select>
        </label>
        <label>
          보기 방식:
          <select id="viewMode">
            <option value="single">한문항씩</option>
            <option value="single-large">한문항씩 큰 화면</option>
            <option value="omr">OMR(시험장형)</option>
            <option value="qa">문제+답/해설 동시 보기</option>
            <option value="all">전체 보기</option>
          </select>
        </label>
        <label>
          표시 개수:
          <input id="maxCount" type="number" min="1" value="" placeholder="전체" />
        </label>
        <label>
          시험시간(분):
          <input id="timeLimitMin" type="number" min="1" value="20" />
        </label>
        <button id="btnStartTest">시험 시작</button>
        <button id="btnShuffle">랜덤 섞기</button>
        <button id="btnReset">초기화</button>
        <label class="inline-check">
          <input id="showAnswerToggle" type="checkbox" checked />
          정답/해설 보이기
        </label>
        <label class="inline-check">
          <input id="autoNext" type="checkbox" checked />
          채점 후 자동 다음
        </label>
        <span id="status">문항 0 / 0</span>
      </section>

      <section id="timerPanel" class="timerPanel" hidden>
        <strong>남은 시간:</strong>
        <span id="timerText">--:--</span>
        <button id="btnFinishTest">시험 종료</button>
      </section>

      <nav id="singleNav" class="singleNav" hidden>
        <button id="btnPrev">이전</button>
        <span id="singlePos">-</span>
        <button id="btnNext">다음</button>
      </nav>
      <section id="omrPanel" class="omrPanel" hidden>
        <h3>OMR 답안지</h3>
        <div id="omrGrid" class="omrGrid" aria-live="polite"></div>
      </section>

      <main id="quizArea">로딩 중...</main>

      <section class="result" id="resultBox" hidden>
        <h2>결과</h2>
        <p id="scoreText"></p>
        <div id="statsByDiff"></div>
        <div class="actions">
          <button id="btnRetryWrong">오답만 다시 풀기</button>
          <button id="btnCopyMarkdown">오답 내역 마크다운 복사</button>
        </div>
        <pre id="wrongMarkdown" hidden></pre>
      </section>

      <section class="result" id="scoreHistoryBox">
        <h2>성적관리</h2>
        <div class="actions">
          <button id="btnClearScore">성적 초기화</button>
        </div>
        <div id="scoreHistoryWrap"></div>
      </section>

      <section class="importWrap">
        <h3>문제 임포트/관리</h3>
        <textarea id="jsonInput" rows="6" placeholder='[{"id":"Q1","question":"문항 내용","type":"multiple","options":["1","2","3","4"],"answer":"2","explanation":"해설","difficulty":"normal","category":"토목기사"}]'></textarea>
        <div class="actions">
          <button id="btnLoadJson">JSON으로 덮어쓰기</button>
          <input type="file" id="fileJson" accept="application/json" />
          <button id="btnSaveToLocal">현재 문제 저장</button>
          <button id="btnClearLocal">로컬 백업 삭제</button>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
